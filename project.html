<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Портфолио | Проекты</title>
  <link rel="stylesheet" href="style.css" />
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
  ></script>
  <style>
    /* ---------- FIX RESPONSIVE ONLY FOR PROJECT PAGE ---------- */
    @media (max-width: 1200px) {
      .project-body .projects-list {
        flex-direction: column !important;
        gap: 24px !important;
      }

      .project-body .project-card {
        grid-template-columns: var(--project-meta-width) minmax(0, var(--project-content-width)) !important;
        gap: 18px 6px !important;
        max-width: 100% !important;
        margin: 0 auto !important;
        padding-top: 10px !important;
      }

      .project-body .project-card__title {
        font-size: clamp(26px, 2vw, 32px) !important;
      }

      .project-body .project-card__image-frame {
        width: 100% !important;
        border-radius: 24px !important;
      }

      .project-body .project-card__button {
        min-width: 160px !important;
        height: 32px !important;
        font-size: 0.8rem !important;
      }

      .project-body .project-detail-gallery {
        grid-template-columns: repeat(3, 1fr) !important;
        grid-template-rows: repeat(2, minmax(180px, auto)) !important;
        gap: 6px !important;
      }

      .project-body .project-detail-gallery__item {
        height: auto !important;
      }
    }

    @media (max-width: 992px) {
      .project-body .project-card {
        gap: 16px 4px !important;
      }

      .project-body .project-card__title {
        font-size: clamp(24px, 2.5vw, 28px) !important;
      }

      .project-body .project-card__button {
        min-width: 150px !important;
        height: 30px !important;
        font-size: 0.78rem !important;
      }

      .project-body .project-card__image {
        aspect-ratio: 1.35 / 1 !important;
      }

      .project-body .projects-navigation {
        width: 100%;
        margin-top: 18px;
        padding-left: 0;
        flex-direction: row;
        justify-content: center;
        gap: 12px;
      }

      .project-body .project-detail-gallery {
        grid-template-columns: repeat(3, 1fr) !important;
        grid-template-rows: repeat(2, minmax(160px, auto)) !important;
      }
    }

    @media (max-width: 768px) {
      .project-body .project-card {
        grid-template-columns: var(--project-meta-width) minmax(0, var(--project-content-width)) !important;
        gap: 12px 4px !important;
      }

      .project-body .project-card__title {
        font-size: clamp(22px, 2vw, 26px) !important;
      }

      .project-body .project-card__button {
        min-width: 150px !important;
        height: 30px !important;
        font-size: 0.78rem !important;
      }

      .project-body .project-detail-gallery {
        grid-template-columns: repeat(3, 1fr) !important;
        grid-template-rows: repeat(2, minmax(140px, auto)) !important;
      }
    }

    @media (max-width: 480px) {
      .project-body .project-card {
        grid-template-columns: var(--project-meta-width) minmax(0, var(--project-content-width)) !important;
        gap: 10px 4px !important;
      }

      .project-body .project-card__title {
        font-size: 20px !important;
      }

      .project-body .project-card__button {
        min-width: 140px !important;
        height: 28px !important;
        font-size: 0.76rem !important;
      }

      .project-body .project-detail-gallery {
        grid-template-columns: repeat(2, 1fr) !important;
        grid-template-rows: repeat(3, 150px) !important;
      }
    }

    /* ---------- FIX NAVIGATION CLICK AREA ---------- */
    .project-page__container {
      position: relative;
    }

    .projects-navigation {
      position: relative;
      z-index: 20;
    }

    .projects-navigation__button {
      position: relative;
      z-index: 21;
      pointer-events: auto;
    }

    .projects-navigation__button:focus-visible {
      outline: 2px solid rgba(0, 0, 0, 0.75);
      outline-offset: 4px;
      border-radius: 10px;
    }
  </style>
</head>
<body class="project-body">
  <header class="header">
    <div class="header__container">
      <nav class="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="project.html" class="nav__link nav__link--active">Проекты</a>
        <a href="info.html" class="nav__link">Обо мне</a>
        <a href="contacts.html" class="nav__link">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="project-page">
    <div class="project-page__background"></div>

    <div class="project-page__container">
      <section class="projects-list" id="projectsList">
        <article class="project-card" data-card-index="0">
          <div class="project-card__meta">
            <h2 class="project-card__title">
              <span class="project-card__number">OU01</span>
              <span class="project-card__name">OUTFIT</span>
            </h2>

            <div class="project-card__genre-badge">ЖАНРЫ</div>

            <ul class="project-card__genres"></ul>

            <div class="project-card__year">2025</div>
          </div>

          <div class="project-card__content">
            <a href="project01.html" class="project-card__image-link" aria-label="Открыть страницу проекта OU01">
              <div class="project-card__image-frame">
                <img
                  src="img/project-01.png"
                  alt="Проект OU01 Outfit"
                  class="project-card__image"
                />
              </div>
            </a>

            <button type="button" class="project-card__button">
              Открыть 3D просмотр
            </button>
          </div>
        </article>

        <article class="project-card" data-card-index="1">
          <div class="project-card__meta">
            <h2 class="project-card__title">
              <span class="project-card__number">OU02</span>
              <span class="project-card__name">OUTFIT</span>
            </h2>

            <div class="project-card__genre-badge">ЖАНРЫ</div>

            <ul class="project-card__genres"></ul>

            <div class="project-card__year">2025</div>
          </div>

          <div class="project-card__content">
            <a href="project02.html" class="project-card__image-link" aria-label="Открыть страницу проекта OU02">
              <div class="project-card__image-frame">
                <img
                  src="img/project-02.png"
                  alt="Проект OU02 Outfit"
                  class="project-card__image"
                />
              </div>
            </a>

            <button type="button" class="project-card__button">
              Открыть 3D просмотр
            </button>
          </div>
        </article>
      </section>

      <nav class="projects-navigation" aria-label="Навигация по проектам">
        <button
          type="button"
          class="projects-navigation__button"
          id="nextProjectButton"
          aria-label="Следующий проект"
        >
          <svg viewBox="0 0 68 68" aria-hidden="true">
            <path d="M12 34h38"></path>
            <path d="M35 18l16 16-16 16"></path>
          </svg>
        </button>

        <button
          type="button"
          class="projects-navigation__button"
          id="prevProjectButton"
          aria-label="Предыдущий проект"
        >
          <svg viewBox="0 0 68 68" aria-hidden="true">
            <path d="M56 34H18"></path>
            <path d="M33 18 17 34l16 16"></path>
          </svg>
        </button>
      </nav>
    </div>
  </main>

  <div class="project-modal" id="project3dModal" aria-hidden="true">
    <div class="project-modal__overlay" id="project3dOverlay"></div>

    <div
      class="project-modal__window glass-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="project3dTitle"
    >
      <div class="project-modal__header">
        <h2 class="project-modal__title" id="project3dTitle">3D просмотр</h2>
        <button
          type="button"
          class="project-modal__close"
          id="project3dClose"
          aria-label="Закрыть окно"
        >
          ×
        </button>
      </div>

      <div class="project-modal__viewer-wrap">
        <model-viewer
          id="project3dViewer"
          class="project-modal__viewer"
          src=""
          alt="3D модель проекта"
          camera-controls
          touch-action="pan-y"
          auto-rotate
          shadow-intensity="1"
          exposure="1"
          environment-image="neutral"
          interaction-prompt="auto"
        ></model-viewer>
      </div>
    </div>
  </div>

  <footer class="footer footer--project">
    <div class="footer__container">
      <div class="footer__contacts">
        <div class="footer__contact">
          <span class="footer__label">GMAIL</span>
          <a href="mailto:nd@gmail.com" class="footer__value">nd@gmail.com</a>
        </div>

        <div class="footer__contact">
          <span class="footer__label">TELEGRAM</span>
          <a href="https://t.me/bybbs11" class="footer__value" target="_blank" rel="noopener noreferrer">@bybbs11</a>
        </div>
      </div>

      <div class="footer__copyright">
        © 2026 BYNIKITADENISOV | RIGHTS RESERVED
      </div>
    </div>
  </footer>

  <script src="slider.js"></script>
</body>
</html>
