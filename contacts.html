                placeholder="Контактная почта"
                autocomplete="off"
              />
            </label>

            <label class="contacts-form__field contacts-form__field--textarea">
              <textarea
                name="message"
                class="contacts-form__textarea"
                placeholder="Сообщение"
                rows="8"
              ></textarea>
            </label>

            <button type="submit" class="contacts-form__button">Отправить</button>

  <div class="contacts-modal" id="successModal" aria-hidden="true">
    <div class="contacts-modal__overlay"></div>
    <div class="contacts-modal__window glass-card" role="dialog" aria-modal="true" aria-labelledby="successTitle">
      <h2 class="contacts-modal__title" id="successTitle">Заявка успешно отправлена</h2>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const modal = document.getElementById('successModal');

    function openModal() {
      modal.classList.add('contacts-modal--active');
      modal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      modal.classList.remove('contacts-modal--active');
      modal.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      form.reset();
      openModal();
    });

    modal.addEventListener('click', function (event) {
      if (
        event.target === modal ||
        event.target.classList.contains('contacts-modal__overlay')
      ) {
        closeModal();
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && modal.classList.contains('contacts-modal--active')) {
        closeModal();
      }
    });
  </script>
